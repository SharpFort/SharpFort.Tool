name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'   # Trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0), falls back to version.props if empty'
        required: false
        type: string

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Build & Test
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore dependencies
        run: dotnet restore SharpFort.Tool.Tests/SharpFort.Tool.Tests.csproj

      - name: Build (Release)
        run: dotnet build SharpFort.Tool.Tests/SharpFort.Tool.Tests.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test SharpFort.Tool.Tests/SharpFort.Tool.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'

  # ─────────────────────────────────────────────
  # Stage 2: Pack & Publish
  # ─────────────────────────────────────────────
  publish:
    name: Publish to NuGet
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── Extract version ────────────────────────
      - name: Extract version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' version.props)
            echo "WARN: No tag or manual version, using version from version.props: $VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      # ── Build & Pack ───────────────────────────
      - name: Restore dependencies
        run: dotnet restore SharpFort.Tool/SharpFort.Tool.csproj

      - name: Pack NuGet package
        run: |
          dotnet pack SharpFort.Tool/SharpFort.Tool.csproj \
            --configuration Release --no-restore \
            -p:PackageVersion=${{ steps.get_version.outputs.VERSION }} \
            --output ./artifacts

      - name: Verify package contents
        run: |
          echo "=== Generated packages ==="
          ls -lh ./artifacts/*.nupkg 2>/dev/null || echo "(no .nupkg)"
          ls -lh ./artifacts/*.snupkg 2>/dev/null || echo "(no .snupkg)"

      # ── NuGet.org login ────────────────────────
      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: songshu

      # ── Publish to NuGet.org ───────────────────
      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # ── Upload artifacts ───────────────────────
      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

      - name: Upload symbol package artifact
        if: hashFiles('./artifacts/*.snupkg') != ''
        uses: actions/upload-artifact@v4
        with:
          name: symbol-packages
          path: ./artifacts/*.snupkg

      # ── Generate Release Notes ─────────────────
      - name: Generate Release Notes
        id: generate_notes
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          NOTES_JSON=$(gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=$TAG_NAME)
          NOTES_BODY=$(echo "$NOTES_JSON" | jq -r .body)
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$NOTES_BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # ── Create GitHub Release ──────────────────
      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## SharpFort.Tool CLI

            SharpFort CLI scaffolding tool, built on .NET 10.

            ### Install

            ```bash
            dotnet tool install --global SharpFort.Tool --version ${{ steps.get_version.outputs.VERSION }}
            ```

            Upgrade:

            ```bash
            dotnet tool update --global SharpFort.Tool --version ${{ steps.get_version.outputs.VERSION }}
            ```

            ### Commands

            | Command | Description |
            |------|------|
            | `sharpfort new [name]` | Create module (interactive mode) |
            | `sharpfort new list` | List available templates |
            | `sharpfort clone [name]` | Clone framework (GitHub/Gitee) |
            | `sharpfort init` | First-time setup wizard |
            | `sharpfort doctor` | Environment diagnostics |
            | `sharpfort clear` | Clean bin/obj artifacts |

            ---

            ${{ steps.generate_notes.outputs.RELEASE_NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}