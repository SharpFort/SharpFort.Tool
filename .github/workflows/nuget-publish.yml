name: Publish to NuGet

on:
  push:
    tags:
      - 'v0.9.2'   # 鐗堟湰鏍囩瑙﹀彂锛屽 v1.0.0銆乿1.2.3
  workflow_dispatch: # 鏀寔鎵嬪姩瑙﹀彂
    inputs:
      version:
        description: '鍙戝竷鐗堟湰鍙凤紙濡?1.0.0锛夛紝涓嶅～鍒欎粠 tag 鎻愬彇'
        required: false
        type: string

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

permissions:
  contents: write   # 鍒涘缓 Release 骞朵笂浼犺祫浜?
  packages: write   # 鍙戝竷 NuGet 鍖?
  id-token: write   # OIDC 璁よ瘉鎵€蹇呴渶

jobs:
  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  # 闃舵涓€锛氭瀯寤?& 娴嬭瘯
  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 瀹屾暣鍘嗗彶鐢ㄤ簬鐗堟湰璁＄畻

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore dependencies
        run: dotnet restore SharpFort.Tool.Tests/SharpFort.Tool.Tests.csproj

      - name: Build (Release)
        run: dotnet build SharpFort.Tool.Tests/SharpFort.Tool.Tests.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test SharpFort.Tool.Tests/SharpFort.Tool.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'

  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  # 闃舵浜岋細鎵撳寘 & 鍙戝竷 NuGet
  # 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  publish:
    name: Publish to NuGet
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 鈹€鈹€ 鐗堟湰鍙锋彁鍙?鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
      - name: Extract version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' version.props)
            echo "⚠️ 未检测到 tag 或手动版本，使用 version.props 中的版本: $VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "馃摝 Publishing version: $VERSION"

      # 鈹€鈹€ 鏋勫缓 & 鎵撳寘 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
      - name: Restore dependencies
        run: dotnet restore SharpFort.Tool/SharpFort.Tool.csproj

      - name: Pack NuGet package
        run: |
          dotnet pack SharpFort.Tool/SharpFort.Tool.csproj \
            --configuration Release --no-restore \
            -p:PackageVersion=${{ steps.get_version.outputs.VERSION }} \
            --output ./artifacts

      - name: Verify package contents
        run: |
          echo "馃摝 鐢熸垚鐨勫寘鏂囦欢锛?
          ls -lh ./artifacts/*.nupkg 2>/dev/null || echo "(鏃?.nupkg)"
          ls -lh ./artifacts/*.snupkg 2>/dev/null || echo "(鏃?.snupkg)"

      # 鈹€鈹€ NuGet.org 鐧诲綍 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: songshu

      # 鈹€鈹€ 鍙戝竷鍒?NuGet.org 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # 鈹€鈹€ 涓婁紶 CI 璧勪骇 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

      - name: Upload symbol package artifact
        if: hashFiles('./artifacts/*.snupkg') != ''
        uses: actions/upload-artifact@v4
        with:
          name: symbol-packages
          path: ./artifacts/*.snupkg

      # 鈹€鈹€ 鐢熸垚 Release Notes 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
      - name: Generate Release Notes
        id: generate_notes
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          NOTES_JSON=$(gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=$TAG_NAME)
          NOTES_BODY=$(echo "$NOTES_JSON" | jq -r .body)
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$NOTES_BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # 鈹€鈹€ 鍒涘缓 GitHub Release 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## 馃洜锔?SharpFort.Tool CLI

            SharpFort 妗嗘灦閰嶅 CLI 鑴氭墜鏋跺伐鍏凤紝鍩轰簬 .NET 10銆?

            ### 瀹夎

            ```bash
            dotnet tool install --global SharpFort.Tool --version ${{ steps.get_version.outputs.VERSION }}
            ```

            鏇存柊宸叉湁瀹夎锛?

            ```bash
            dotnet tool update --global SharpFort.Tool --version ${{ steps.get_version.outputs.VERSION }}
            ```

            ### 鍛戒护涓€瑙?

            | 鍛戒护 | 璇存槑 |
            |------|------|
            | `sharpfort new [name]` | 鍒涘缓妯″潡锛堟敮鎸佷氦浜掓ā寮忥級 |
            | `sharpfort new list` | 鍒楀嚭鍙敤妯℃澘 |
            | `sharpfort clone [name]` | 鍏嬮殕妗嗘灦锛圙itHub/Gitee 鍙屾簮锛?|
            | `sharpfort init` | 棣栨璁剧疆鍚戝 |
            | `sharpfort doctor` | 鐜璇婃柇 |
            | `sharpfort clear` | 娓呯悊 bin/obj 缂栬瘧浜х墿 |

            ---

            ${{ steps.generate_notes.outputs.RELEASE_NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
